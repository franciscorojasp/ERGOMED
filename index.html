<!DOCTYPE html>
<html lang="es-VE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERGOMED - Cargando...</title>
  <meta http-equiv="refresh" content="2;url=./mil-pollos-pwa/">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #081C15 0%, #1B4332 100%);
      --text-color: #E8F5E9;
      --accent-color: #52B788;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-color);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loader-container {
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    .logo-glow {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      display: inline-block;
    }

    /* Elegant double ring spinner */
    .spinner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 4px solid rgba(82, 183, 136, 0.1);
      border-left-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    .spinner-inner {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-right-color: #FFF;
      border-radius: 50%;
      animation: spin-reverse 2s linear infinite;
    }

    .icon-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.5rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 8px;
      background: linear-gradient(120deg, #FFFFFF 0%, #A3E4D7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: rgba(232, 245, 233, 0.7);
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    .redirect-btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: rgba(82, 183, 136, 0.15);
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .redirect-btn:hover {
      background-color: var(--accent-color);
      color: #081C15;
      box-shadow: 0 0 15px rgba(82, 183, 136, 0.4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      to { transform: rotate(-360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="logo-glow">
      <div class="spinner"></div>
      <div class="spinner-inner"></div>
      <div class="icon-placeholder">🐔</div>
    </div>
    <h1>ERGOMED</h1>
    <p>Redireccionando a la PWA de Mil Pollos...</p>
    <a href="./mil-pollos-pwa/" class="redirect-btn">Entrar Manualmente</a>
  </div>

  <script>
    // Redirect after 800ms to allow animation to show
    setTimeout(function() {
      window.location.href = './mil-pollos-pwa/';
    }, 800);
  </script>
</body>
</html>
