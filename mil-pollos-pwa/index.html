<!DOCTYPE html>
<html lang="es-VE">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1B4332" />
  <meta name="description" content="Sistema de Gestión de Salud Ocupacional para Avícola Guacara C.A. – Marca Mil Pollos. Evaluaciones médicas, control de presión arterial, reposos, referencias y más." />
  <title>Mil Pollos – Salud Ocupacional</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/print.css" />

  <!-- CDN Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

  <!-- =========================================================
       LOGIN SCREEN
       ========================================================= -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">🐔</div>
        <div class="login-logo-text">
          <h1>Mil Pollos</h1>
          <p>Salud Ocupacional</p>
        </div>
      </div>

      <h2 class="login-title">Bienvenido</h2>
      <p class="login-subtitle">Inicie sesión para acceder al sistema de salud ocupacional de Avícola Guacara, C.A.</p>

      <form id="login-form" novalidate>
        <div class="form-group mb-4">
          <label class="form-label" for="login-username">Usuario</label>
          <input
            class="form-input"
            id="login-username"
            type="text"
            placeholder="Ingrese su usuario"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group mb-4">
          <label class="form-label" for="login-password">Contraseña</label>
          <div class="relative">
            <input
              class="form-input"
              id="login-password"
              type="password"
              placeholder="Ingrese su contraseña"
              autocomplete="current-password"
              required
            />
            <button type="button" id="toggle-pwd"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px">
              👁️
            </button>
          </div>
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-lg w-full" style="margin-top:var(--space-6)">
          Ingresar
        </button>
      </form>

      <div style="margin-top:var(--space-6);padding-top:var(--space-4);border-top:1px solid var(--border-color);text-align:center">
        <p class="text-xs text-muted">Credenciales iniciales: <strong>admin</strong> / <strong>admin123</strong></p>
        <p class="text-xs text-muted mt-2">Avícola Guacara, C.A. · ERGOMED © 2025</p>
      </div>
    </div>
  </div>

  <!-- =========================================================
       MAIN APPLICATION
       ========================================================= -->
  <div id="app" class="hidden">

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay"></div>

    <!-- ---- SIDEBAR ---- -->
    <nav id="sidebar">
      <div id="sidebar-header">
        <div class="sidebar-logo">🐔</div>
        <div class="sidebar-brand">
          <h1>Mil Pollos</h1>
          <p>Salud Ocupacional</p>
        </div>
      </div>

      <div id="sidebar-nav">
        <!-- Built dynamically by app.js -->
      </div>

      <div id="sidebar-footer">
        <div class="nav-item" id="logout-btn">
          <span class="nav-icon">🚪</span>
          <span class="nav-label">Cerrar Sesión</span>
        </div>
      </div>
    </nav>

    <!-- ---- MAIN AREA ---- -->
    <div id="main">

      <!-- Header -->
      <header id="header">
        <button id="sidebar-toggle" title="Menú" aria-label="Abrir menú">☰</button>

        <div class="header-center">
          <h2>Dashboard</h2>
          <p>📊 Principal</p>
        </div>

        <div class="header-actions">
          <!-- User menu -->
          <div style="position:relative">
            <div class="user-avatar" id="user-avatar" title="Perfil"></div>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main id="content">
        <!-- Injected by router -->
      </main>

    </div><!-- /#main -->

  </div><!-- /#app -->

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- App scripts (ES Modules) -->
  <script type="module" src="js/app.js"></script>

  <!-- Toggle password visibility -->
  <script>
    document.getElementById('toggle-pwd')?.addEventListener('click', function() {
      const input = document.getElementById('login-password');
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  </script>

</body>
</html>
